name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests scoped and outcome-oriented so they are easier to prioritize.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain or gap are you trying to solve?
      placeholder: As a contributor/user, I want...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
      placeholder: Add/adjust...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other options tried or considered
  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Developer velocity
        - Reliability/stability
        - UX quality
        - Performance
        - Documentation
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and discussions.
          required: true
