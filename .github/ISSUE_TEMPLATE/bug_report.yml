name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough detail to reproduce quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened vs what you expected?
      placeholder: Clear one-paragraph summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, and mode (demo/live).
      placeholder: Windows 11, Chrome 125, Node 20, demo mode
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/screenshots
      description: Paste stack traces, logs, or screenshots.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I can still reproduce this on the latest main branch.
          required: true
