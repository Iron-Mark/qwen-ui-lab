name: PR Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # E2E and visual regression omitted from the required PR gate — Playwright + prod server
  # adds several minutes and snapshot diffs are noisy on feature branches.
  # Optional warn-only E2E smoke: pr-e2e-smoke.yml (mobile + a11y + live-qwen-contract + upload-flow).
  # Main push runs visual-regression (hard fail) and strict production LCP in ci.yml;
  # full E2E runs nightly (e2e-nightly.yml) and via workflow_dispatch.
