name: CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security (secrets/deps)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency policy (high+ prod vulns fail)
        run: npm audit --omit=dev --audit-level=high

  quality:
    name: Quality (lint/test/build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Validate deploy env defaults (demo target)
        run: npm run deploy:env:demo

      - name: Build
        run: npm run build

  web-audits:
    name: Web audits (links/perf/assets)
    runs-on: ubuntu-latest
    needs:
      - quality
      - security
    timeout-minutes: 20
    env:
      CI: true
      PORT: 3000
      DASHSCOPE_API_KEY: ""
      QWEN_LIVE_ANALYSIS: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for audits
        run: npm run build

      - name: Start app
        run: npm run start -- --port "${PORT}" > /tmp/app.log 2>&1 &

      - name: Wait for app
        run: npx --yes wait-on@7.2.0 --timeout 120000 http://127.0.0.1:${PORT}

      - name: Check internal links
        run: npx --yes linkinator@6.1.2 http://127.0.0.1:${PORT} --recurse --timeout 15000 --retry --concurrency 3 --skip ".*(_next|api/analyze-ui).*"

      - name: Lighthouse performance budget
        run: |
          npx --yes lighthouse@12.6.1 http://127.0.0.1:${PORT}/ \
            --quiet \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance \
            --throttling-method=provided \
            --max-wait-for-load=45000 \
            --output=json \
            --output-path=./lh-home.json
          npx --yes lighthouse@12.6.1 http://127.0.0.1:${PORT}/design-system \
            --quiet \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance \
            --throttling-method=provided \
            --max-wait-for-load=45000 \
            --output=json \
            --output-path=./lh-design-system.json
          node -e "const fs=require('node:fs'); const files=['./lh-home.json','./lh-design-system.json']; const min=0.45; const fail=[]; for (const file of files){const raw=JSON.parse(fs.readFileSync(file,'utf8')); const score=raw.categories?.performance?.score ?? -1; console.log(file + ' performance=' + score); if(score < min) fail.push(file + '=' + score);} if(fail.length){console.error('Performance budget failed (<'+min+'): '+fail.join(', ')); process.exit(1);} "

      - name: Validate public assets
        run: npm run validate:assets

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: /tmp/app.log

  visual-regression:
    name: Visual regression
    runs-on: ubuntu-latest
    needs:
      - quality
    timeout-minutes: 25
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression spec
        run: npx playwright test e2e/visual-regression.spec.ts

      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs-${{ github.run_id }}
          path: |
            test-results/
          retention-days: 14

  perf-lcp-budget:
    name: Production LCP budget
    runs-on: ubuntu-latest
    needs:
      - quality
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve production URL
        id: prod
        run: |
          URL="${{ vars.PRODUCTION_DEPLOY_URL }}"
          if [ -z "$URL" ]; then
            URL="https://qwen-ui-lab.vercel.app"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Check production LCP budget
        run: npm run perf:lcp-budget
        env:
          PERF_URL: ${{ steps.prod.outputs.url }}
          # Production probes can spike on live network/CDN variance; set PERF_LCP_STRICT=true to block.
          PERF_LCP_STRICT: ${{ vars.PERF_LCP_STRICT || 'false' }}

      - name: Upload Lighthouse report on budget breach
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcp-budget-report-${{ github.run_id }}
          path: .perf/lighthouse-lcp-budget.json
          if-no-files-found: ignore
          retention-days: 14
