name: PR E2E Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: E2E smoke (mobile + a11y + live contract)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Warn-only on PRs unless repo variable PR_E2E_STRICT=true. Hard fail on manual dispatch.
    continue-on-error: ${{ github.event_name == 'pull_request' && vars.PR_E2E_STRICT != 'true' }}
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run PR E2E smoke
        run: npm run test:e2e:pr-smoke

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-e2e-smoke-failure-${{ github.run_id }}
          path: |
            test-results/
          retention-days: 7
