<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#f6f7f9"/>
  <text x="800" y="54" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">
    Before / After: Screenshot Scaffold Refinement
  </text>
  <text x="800" y="86" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    A raw first pass becomes a typed, accessible React + Tailwind starter.
  </text>

  <rect x="60" y="128" width="700" height="700" rx="20" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="840" y="128" width="700" height="700" rx="20" fill="#ffffff" stroke="#d1fae5"/>

  <text x="100" y="178" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">
    BEFORE - First pass scaffold
  </text>
  <text x="880" y="178" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">
    AFTER - Refined starter
  </text>

  <rect x="100" y="210" width="620" height="250" rx="12" fill="#111827"/>
  <text x="128" y="246" font-family="Consolas, monospace" font-size="16" fill="#9ca3af">// generated-first-pass.tsx</text>
  <text x="128" y="286" font-family="Consolas, monospace" font-size="16" fill="#fca5a5">&lt;div style={{ padding: 32 }}&gt;</text>
  <text x="128" y="326" font-family="Consolas, monospace" font-size="16" fill="#fca5a5">  &lt;section style={{ display: "grid" }}&gt;</text>
  <text x="128" y="366" font-family="Consolas, monospace" font-size="16" fill="#fca5a5">    &lt;button&gt;+ Add User&lt;/button&gt;</text>
  <text x="128" y="406" font-family="Consolas, monospace" font-size="16" fill="#e5e7eb">  ...</text>

  <rect x="880" y="210" width="620" height="250" rx="12" fill="#111827"/>
  <text x="908" y="246" font-family="Consolas, monospace" font-size="16" fill="#9ca3af">// DashboardShell.tsx</text>
  <text x="908" y="286" font-family="Consolas, monospace" font-size="16" fill="#93c5fd">export function DashboardShell(props) {</text>
  <text x="908" y="326" font-family="Consolas, monospace" font-size="16" fill="#d1fae5">  &lt;main className="mx-auto max-w-7xl"&gt;</text>
  <text x="908" y="366" font-family="Consolas, monospace" font-size="16" fill="#d1fae5">    &lt;StatGrid stats={props.stats} /&gt;</text>
  <text x="908" y="406" font-family="Consolas, monospace" font-size="16" fill="#e5e7eb">  ...</text>

  <text x="100" y="510" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">
    Cleanup needed
  </text>
  <text x="100" y="548" font-family="Inter, Arial, sans-serif" font-size="15" fill="#b91c1c">- Inline styles instead of tokens</text>
  <text x="100" y="586" font-family="Inter, Arial, sans-serif" font-size="15" fill="#b91c1c">- One large component</text>
  <text x="100" y="624" font-family="Inter, Arial, sans-serif" font-size="15" fill="#b91c1c">- Weak semantic structure</text>
  <text x="100" y="662" font-family="Inter, Arial, sans-serif" font-size="15" fill="#b91c1c">- Missing responsive and empty states</text>
  <text x="100" y="700" font-family="Inter, Arial, sans-serif" font-size="15" fill="#b91c1c">- Sparse accessibility affordances</text>

  <text x="880" y="510" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">
    Refinements applied
  </text>
  <text x="880" y="548" font-family="Inter, Arial, sans-serif" font-size="15" fill="#047857">+ Tailwind classes and design tokens</text>
  <text x="880" y="586" font-family="Inter, Arial, sans-serif" font-size="15" fill="#047857">+ Focused components for repeated regions</text>
  <text x="880" y="624" font-family="Inter, Arial, sans-serif" font-size="15" fill="#047857">+ Typed props and sample data constants</text>
  <text x="880" y="662" font-family="Inter, Arial, sans-serif" font-size="15" fill="#047857">+ Responsive layout assumptions</text>
  <text x="880" y="700" font-family="Inter, Arial, sans-serif" font-size="15" fill="#047857">+ Keyboard and screen-reader friendly controls</text>

  <rect x="100" y="748" width="280" height="54" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="240" y="781" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#b91c1c" text-anchor="middle">
    1 component / 300+ lines
  </text>

  <rect x="880" y="748" width="280" height="54" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="1020" y="781" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#047857" text-anchor="middle">
    Smaller typed components
  </text>
</svg>
