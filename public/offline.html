<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <title>Offline - qwen-ui-lab</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --fg: #18181b;
        --muted: #71717a;
        --accent: #4f46e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --accent: #818cf8;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      img {
        width: 4rem;
        height: 4rem;
        border-radius: 0.75rem;
      }
      h1 {
        margin: 1rem 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      .actions {
        margin-top: 1.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }
      a,
      button {
        appearance: none;
        border: 0;
        border-radius: 0.5rem;
        padding: 0.625rem 1rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }
      a {
        background: var(--accent);
        color: #fff;
      }
      button {
        background: transparent;
        color: var(--fg);
        border: 1px solid color-mix(in srgb, var(--muted) 35%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" width="64" height="64" alt="" />
      <h1>You're offline</h1>
      <p>
        qwen-ui-lab can still open its cached demo shell. Reconnect to fetch
        fresh pages, or return to the dashboard.
      </p>
      <div class="actions">
        <a href="/">Open dashboard</a>
        <button type="button" onclick="location.reload()">Try again</button>
      </div>
    </main>
  </body>
</html>
