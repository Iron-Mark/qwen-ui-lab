<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" fill="#fafafa"/>
  <!-- Auth card -->
  <rect x="400" y="80" width="400" height="560" rx="12" fill="#fff" stroke="#e4e4e7"/>
  <!-- Brand -->
  <rect x="576" y="120" width="48" height="48" rx="12" fill="#18181b"/>
  <text x="600" y="190" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#18181b" text-anchor="middle">Sign in</text>
  <text x="600" y="214" font-family="Inter,sans-serif" font-size="13" fill="#71717a" text-anchor="middle">Welcome back  enter your credentials</text>
  <!-- Email field -->
  <text x="432" y="258" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#18181b">Email</text>
  <rect x="432" y="268" width="336" height="44" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="448" y="296" font-family="Inter,sans-serif" font-size="14" fill="#a1a1aa">you@company.com</text>
  <!-- Password field -->
  <text x="432" y="340" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#18181b">Password</text>
  <rect x="432" y="350" width="336" height="44" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="448" y="378" font-family="Inter,sans-serif" font-size="14" fill="#a1a1aa">""""""""</text>
  <!-- Primary CTA -->
  <rect x="432" y="418" width="336" height="44" rx="8" fill="#18181b"/>
  <text x="600" y="446" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Continue</text>
  <!-- Divider -->
  <line x1="432" y1="488" x2="768" y2="488" stroke="#e4e4e7"/>
  <text x="600" y="494" font-family="Inter,sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">or continue with</text>
  <!-- OAuth buttons -->
  <rect x="432" y="512" width="160" height="40" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="512" y="537" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#18181b" text-anchor="middle">Google</text>
  <rect x="608" y="512" width="160" height="40" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="688" y="537" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#18181b" text-anchor="middle">GitHub</text>
  <!-- Footer links -->
  <text x="520" y="600" font-family="Inter,sans-serif" font-size="12" fill="#71717a">Forgot password?</text>
  <text x="680" y="600" font-family="Inter,sans-serif" font-size="12" fill="#18181b" font-weight="500">Sign up</text>
</svg>
