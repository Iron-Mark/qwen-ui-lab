<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" fill="#fafafa"/>
  <!-- Page title -->
  <text x="80" y="56" font-family="Inter,sans-serif" font-size="24" font-weight="700" fill="#18181b">Settings</text>
  <text x="80" y="80" font-family="Inter,sans-serif" font-size="14" fill="#71717a">Manage your account and preferences</text>
  <!-- Left nav -->
  <rect x="80" y="112" width="180" height="560" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <rect x="96" y="136" width="148" height="36" rx="6" fill="#f4f4f5"/>
  <text x="112" y="159" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#18181b">Profile</text>
  <text x="112" y="199" font-family="Inter,sans-serif" font-size="14" fill="#71717a">Notifications</text>
  <text x="112" y="235" font-family="Inter,sans-serif" font-size="14" fill="#71717a">Billing</text>
  <!-- Main panel -->
  <rect x="280" y="112" width="840" height="560" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="312" y="156" font-family="Inter,sans-serif" font-size="18" font-weight="600" fill="#18181b">Profile</text>
  <!-- Display name -->
  <text x="312" y="200" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#18181b">Display name</text>
  <rect x="312" y="210" width="400" height="40" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="328" y="236" font-family="Inter,sans-serif" font-size="14" fill="#18181b">Alex Chen</text>
  <!-- Email -->
  <text x="312" y="280" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#18181b">Email</text>
  <rect x="312" y="290" width="400" height="40" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="328" y="316" font-family="Inter,sans-serif" font-size="14" fill="#18181b">alex@example.com</text>
  <!-- Notifications section -->
  <line x1="312" y1="360" x2="1088" y2="360" stroke="#e4e4e7"/>
  <text x="312" y="396" font-family="Inter,sans-serif" font-size="18" font-weight="600" fill="#18181b">Notifications</text>
  <!-- Toggle row 1 -->
  <text x="312" y="440" font-family="Inter,sans-serif" font-size="14" fill="#18181b">Email alerts</text>
  <rect x="1040" y="424" width="48" height="28" rx="14" fill="#18181b"/>
  <circle cx="1064" cy="438" r="10" fill="#fff"/>
  <!-- Toggle row 2 -->
  <text x="312" y="488" font-family="Inter,sans-serif" font-size="14" fill="#18181b">Push notifications</text>
  <rect x="1040" y="472" width="48" height="28" rx="14" fill="#e4e4e7"/>
  <circle cx="1052" cy="486" r="10" fill="#fff"/>
  <!-- Save bar -->
  <rect x="280" y="640" width="840" height="56" fill="#fff" stroke="#e4e4e7"/>
  <rect x="960" y="652" width="80" height="36" rx="8" fill="#fff" stroke="#e4e4e7"/>
  <text x="1000" y="675" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#18181b" text-anchor="middle">Cancel</text>
  <rect x="1056" y="652" width="80" height="36" rx="8" fill="#18181b"/>
  <text x="1096" y="675" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Save</text>
</svg>
